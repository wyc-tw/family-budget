<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2d6a4f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="夫妻記帳">
<title>夫妻記帳本</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f3ee; --surface: #ffffff; --border: #e2ddd5; --text: #1a1814; --muted: #7a756c;
    --accent: #2d6a4f; --accent-light: #e8f4ef; --accent-muted: #74b49b;
    --income: #2563eb; --income-light: #eff6ff;
    --husband: #3d5a80; --husband-light: #e8eef5;
    --wife: #c05c7e; --wife-light: #faedf2;
    --danger: #c0392b; --mono: 'DM Mono', monospace; --sans: 'Noto Sans TC', sans-serif;
  }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; }
  .logo-text { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .logo-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .header-badge { font-family: var(--mono); font-size: 11px; background: var(--accent-light); color: var(--accent); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--accent-muted); display: flex; align-items: center; gap: 5px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; display: inline-block; }
  .status-dot.ok { background: var(--accent); }
  .status-dot.err { background: var(--danger); }
  .status-dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .btn-refresh { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); font-size: 12px; font-family: var(--sans); cursor: pointer; color: var(--muted); transition: all 0.15s; display: flex; align-items: center; gap: 4px; }
  .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }
  .btn-refresh.spinning span { display: inline-block; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .month-tabs { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; overflow-x: auto; }
  .month-tab { padding: 12px 18px; font-size: 13px; font-family: var(--sans); border: none; background: none; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; }
  .month-tab:hover { color: var(--text); }
  .month-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

  main { max-width: 960px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

  .card { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; }
  .card-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .card-header-title { font-size: 14px; font-weight: 500; }
  .card-body { padding: 20px; }
  .form-card { grid-column: 1 / 2; }
  .stats-card { grid-column: 2 / 3; }
  .records-card { grid-column: 1 / 3; }

  /* 收入/支出 type toggle */
  .type-toggle { display: flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 16px; }
  .type-btn { flex: 1; padding: 10px; border: none; background: var(--bg); font-family: var(--sans); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; color: var(--muted); }
  .type-btn.expense.active { background: var(--accent-light); color: var(--accent); }
  .type-btn.income.active { background: var(--income-light); color: var(--income); }
  .type-btn:first-child { border-right: 1px solid var(--border); }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
  .field input, .field select, .field textarea { width: 100%; max-width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: var(--sans); color: var(--text); background: var(--bg); outline: none; transition: border-color 0.15s; -webkit-appearance: none; appearance: none; }
  .field input[type="date"] { display: block; min-width: 0; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: white; }
  .field textarea { resize: none; height: 60px; }

  .amount-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .toggle-group { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .toggle-btn { flex: 1; padding: 9px 12px; border: none; background: var(--bg); font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; color: var(--muted); }
  .toggle-btn.husband.active { background: var(--husband-light); color: var(--husband); }
  .toggle-btn.wife.active { background: var(--wife-light); color: var(--wife); }
  .toggle-btn:first-child { border-right: 1px solid var(--border); }

  .cat-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .cat-pill { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); font-size: 12px; font-family: var(--sans); cursor: pointer; transition: all 0.15s; color: var(--muted); }
  .cat-pill.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 500; }
  .cat-pill.income-pill.active { background: var(--income-light); border-color: var(--income); color: var(--income); }

  .btn-submit { width: 100%; padding: 11px; background: var(--accent); color: white; border: none; border-radius: 9px; font-family: var(--sans); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; margin-top: 6px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-submit:hover { opacity: 0.88; }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-submit.income-mode { background: var(--income); }

  /* Stats */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-box { padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .stat-value { font-family: var(--mono); font-size: 18px; font-weight: 500; }
  .stat-value.green { color: var(--accent); }
  .stat-value.blue { color: var(--income); }
  .stat-value.husband { color: var(--husband); }
  .stat-value.wife { color: var(--wife); }
  .stat-value.positive { color: var(--accent); }
  .stat-value.negative { color: var(--danger); }

  .cat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .cat-bar-label { font-size: 12px; color: var(--muted); width: 60px; flex-shrink: 0; }
  .cat-bar-track { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; border: 1px solid var(--border); }
  .cat-bar-fill { height: 100%; border-radius: 3px; background: var(--accent-muted); transition: width 0.4s; }
  .cat-bar-amt { font-family: var(--mono); font-size: 12px; color: var(--muted); width: 70px; text-align: right; flex-shrink: 0; }

  /* Records */
  .records-toolbar { display: flex; align-items: center; gap: 8px; padding: 12px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .filter-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); font-size: 12px; font-family: var(--sans); cursor: pointer; color: var(--muted); transition: all 0.15s; }
  .filter-btn.active { background: var(--text); color: white; border-color: var(--text); }

  /* 左滑操作 */
  .record-wrapper { position: relative; overflow: hidden; border-bottom: 1px solid var(--border); }
  .record-wrapper:last-child { border-bottom: none; }
  .record-actions { position: absolute; right: 0; top: 0; bottom: 0; display: flex; transform: translateX(100%); transition: transform 0.25s ease; }
  .record-actions .action-btn { width: 72px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; font-family: var(--sans); display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 5px; white-space: nowrap; transition: opacity 0.15s; }
  .record-actions .action-btn:hover { opacity: 0.85; }
  .action-btn.edit-btn { background: var(--accent-light); color: var(--accent); }
  .action-btn.del-btn { background: #fdecea; color: var(--danger); }
  .action-btn .action-icon { font-size: 14px; line-height: 1; }
  .record-wrapper.swiped .record-actions { transform: translateX(0); }
  .record-wrapper.swiped .record-row { transform: translateX(-160px); }

  .record-row { display: grid; grid-template-columns: 55px 1fr 90px; align-items: center; gap: 10px; padding: 13px 20px; font-size: 13px; transition: transform 0.25s ease, background 0.1s; background: var(--surface); }
  .record-row:hover { background: var(--bg); }
  .record-date { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; background: var(--bg); border: 1px solid var(--border); color: var(--muted); white-space: nowrap; }
  .tag.husband { background: var(--husband-light); border-color: var(--husband-light); color: var(--husband); }
  .tag.wife { background: var(--wife-light); border-color: var(--wife-light); color: var(--wife); }
  .tag.expense { background: var(--accent-light); border-color: var(--accent-light); color: var(--accent); }
  .tag.income { background: var(--income-light); border-color: var(--income-light); color: var(--income); }
  .record-amount { font-family: var(--mono); font-weight: 500; text-align: right; }
  .record-amount.income { color: var(--income); }

  /* 桌機 hover 按鈕 */
  .record-hover-actions { display: none; gap: 4px; justify-content: flex-end; }
  .hover-btn { background: none; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 12px; padding: 4px 10px; font-family: var(--sans); color: var(--muted); transition: all 0.15s; white-space: nowrap; }
  .hover-btn.edit { color: var(--accent); border-color: var(--accent-muted); background: var(--accent-light); }
  .hover-btn.del { color: var(--danger); border-color: #f5c6c2; background: #fdecea; }
  .hover-btn:hover { opacity: 0.8; }

  @media (hover: hover) {
    .record-row { grid-template-columns: 55px 1fr 90px 150px; }
    .record-hover-actions { display: flex; opacity: 0; transition: opacity 0.15s; gap: 6px; }
    .record-wrapper:hover .record-hover-actions { opacity: 1; }
    .record-actions { display: none; }
  }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.hidden { display: none; }
  .modal { background: var(--surface); border-radius: 16px; padding: 24px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
  .modal-field input, .modal-field select { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: var(--sans); background: var(--bg); color: var(--text); outline: none; -webkit-appearance: none; }
  .modal-field input:focus, .modal-field select:focus { border-color: var(--accent); background: white; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-btn { flex: 1; padding: 10px; border-radius: 9px; font-size: 14px; font-family: var(--sans); font-weight: 500; cursor: pointer; border: none; transition: opacity 0.15s; }
  .modal-btn.cancel { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
  .modal-btn.save { background: var(--accent); color: white; }
  .modal-btn:hover { opacity: 0.85; }

  .empty-state { padding: 40px; text-align: center; color: var(--muted); font-size: 14px; }
  .loading-state { padding: 40px; text-align: center; color: var(--muted); font-size: 13px; }
  .section-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: white; padding: 10px 20px; border-radius: 8px; font-size: 13px; transition: transform 0.25s ease; z-index: 100; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 700px) {
    main { grid-template-columns: 1fr; padding: 16px; }
    .form-card, .stats-card, .records-card { grid-column: 1 / 2; }
    .record-row { grid-template-columns: 48px 1fr 70px; gap: 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">♡</div>
    <div>
      <div class="logo-text">夫妻記帳本</div>
      <div class="logo-sub">共同財務管理</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-refresh" id="refreshBtn" onclick="loadRecords()">
      <span>↻</span> 同步
    </button>
    <div class="header-badge">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">連線中...</span>
    </div>
  </div>
</header>

<div class="month-tabs" id="monthTabs"></div>

<main>

  <!-- 新增記錄 -->
  <div class="card form-card">
    <div class="card-header">
      <span>✏️</span>
      <span class="card-header-title">新增記錄</span>
    </div>
    <div class="card-body">

      <!-- 誰 -->
      <div class="field">
        <label>誰</label>
        <div class="toggle-group">
          <button class="toggle-btn husband active" id="btnHusband" onclick="selectWho('老公')">👨 老公</button>
          <button class="toggle-btn wife" id="btnWife" onclick="selectWho('老婆')">👩 老婆</button>
        </div>
      </div>

      <!-- 收入/支出切換 -->
      <div class="type-toggle">
        <button class="type-btn expense active" id="btnExpense" onclick="selectType('支出')">💸 支出</button>
        <button class="type-btn income" id="btnIncome" onclick="selectType('收入')">💰 收入</button>
      </div>

      <div class="field">
        <label>日期</label>
        <input type="date" id="inputDate">
      </div>

      <div class="field">
        <label>金額（元）</label>
        <input type="number" id="inputAmount" placeholder="0" min="0">
      </div>

      <div class="field">
        <label>分類</label>
        <!-- 支出分類 -->
        <div class="cat-grid" id="catExpense">
          <button class="cat-pill active" data-cat="奕安" onclick="selectCat(this)">👶 奕安</button>
          <button class="cat-pill" data-cat="晚餐" onclick="selectCat(this)">🍽 晚餐</button>
          <button class="cat-pill" data-cat="點心" onclick="selectCat(this)">🧁 點心</button>
          <button class="cat-pill" data-cat="買菜" onclick="selectCat(this)">🥦 買菜</button>
          <button class="cat-pill" data-cat="購物" onclick="selectCat(this)">🛍 購物</button>
          <button class="cat-pill" data-cat="其他" onclick="selectCat(this)">📦 其他</button>
        </div>
      </div>

      <div class="field">
        <label>備註（選填）</label>
        <textarea id="inputNote" placeholder="例：五月薪資、家樂福採購..."></textarea>
      </div>

      <button class="btn-submit" id="submitBtn" onclick="submitRecord()">
        <span>＋ 新增記錄</span>
      </button>

    </div>
  </div>

  <!-- 統計 -->
  <div class="card stats-card">
    <div class="card-header">
      <span>📊</span>
      <span class="card-header-title" id="statsTitle">本月統計</span>
    </div>
    <div class="card-body">
      <div class="stat-grid">
        <div class="stat-box">
          <div class="stat-label">收入</div>
          <div class="stat-value blue" id="statIncome">$0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">支出</div>
          <div class="stat-value green" id="statExpense">$0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">結餘</div>
          <div class="stat-value" id="statBalance">$0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">筆數</div>
          <div class="stat-value" id="statCount">0 筆</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">老公支出</div>
          <div class="stat-value husband" id="statHusband">$0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">老婆支出</div>
          <div class="stat-value wife" id="statWife">$0</div>
        </div>
      </div>
      <div class="section-label">支出分類佔比</div>
      <div id="catBreakdown"></div>
    </div>
  </div>

  <!-- 記錄列表 -->
  <div class="card records-card">
    <div class="card-header">
      <span>📋</span>
      <span class="card-header-title">記錄</span>
    </div>
    <div class="records-toolbar">
      <button class="filter-btn active" onclick="filterRecords('全部', this)">全部</button>
      <button class="filter-btn" onclick="filterRecords('支出', this)">支出</button>
      <button class="filter-btn" onclick="filterRecords('收入', this)">收入</button>
      <button class="filter-btn" onclick="filterRecords('老公', this)">老公</button>
      <button class="filter-btn" onclick="filterRecords('老婆', this)">老婆</button>
    </div>
    <div class="records-list" id="recordsList">
      <div class="loading-state">載入中...</div>
    </div>
  </div>

</main>

<div class="modal-overlay hidden" id="editModal">
  <div class="modal">
    <div class="modal-title">編輯記錄</div>
    <div class="modal-field">
      <label>日期</label>
      <input type="date" id="editDate">
    </div>
    <div class="modal-field">
      <label>金額</label>
      <input type="number" id="editAmount" min="0">
    </div>
    <div class="modal-field">
      <label>分類</label>
      <select id="editCategory">
        <option>奕安</option>
        <option>晚餐</option>
        <option>點心</option>
        <option>買菜</option>
        <option>購物</option>
        <option>其他</option>
      </select>
    </div>
    <div class="modal-field">
      <label>備註</label>
      <input type="text" id="editNote" placeholder="備註（選填）">
    </div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeEdit()">取消</button>
      <button class="modal-btn save" onclick="saveEdit()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ★ 把你的 Apps Script 網址貼在這裡
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxAyuRVJ3DbBFjkL23p4oXWMU8SrJPoFfkagznMb4kV0XN9X_G7pp_ZVqFb2zOSRhGh/exec';

  let records = [];
  let whoSelected = '老公';
  let catSelected = '奕安';
  let typeSelected = '支出';
  let currentFilter = '全部';
  let currentMonth = '';
  let availableMonths = [];

  // 台北時區今天日期
  function todayTW() {
    const now = new Date();
    const tw = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
    const y = tw.getFullYear();
    const m = String(tw.getMonth() + 1).padStart(2, '0');
    const d = String(tw.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  document.getElementById('inputDate').value = todayTW();

  function selectType(type) {
    typeSelected = type;
    const isIncome = type === '收入';
    document.getElementById('btnExpense').classList.toggle('active', !isIncome);
    document.getElementById('btnIncome').classList.toggle('active', isIncome);
    document.getElementById('submitBtn').classList.toggle('income-mode', isIncome);
  }

  function selectWho(who) {
    whoSelected = who;
    document.getElementById('btnHusband').classList.toggle('active', who === '老公');
    document.getElementById('btnWife').classList.toggle('active', who === '老婆');
  }

  function selectCat(el) {
    const grid = el.closest('.cat-grid');
    grid.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    catSelected = el.dataset.cat;
  }

  // ── 快取工具 ──────────────────────────────────
  const CACHE_KEY = 'budget_cache';

  function saveCache(month, data) {
    try {
      const cache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
      cache[month] = { records: data, ts: Date.now() };
      localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
    } catch(e) {}
  }

  function loadCache(month) {
    try {
      const cache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
      return cache[month] ? cache[month].records : null;
    } catch(e) { return null; }
  }

  function saveMonthsCache(months) {
    try { localStorage.setItem('budget_months', JSON.stringify(months)); } catch(e) {}
  }

  function loadMonthsCache() {
    try { return JSON.parse(localStorage.getItem('budget_months') || 'null'); } catch(e) { return null; }
  }
  // ─────────────────────────────────────────────

  // 用 fetch 讀取，處理 Google 轉址
  function fetchData(url) {
    return new Promise((resolve, reject) => {
      const cbName = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*10000);
      const script = document.createElement('script');
      let done = false;

      const cleanup = () => {
        done = true;
        delete window[cbName];
        if (script.parentNode) script.parentNode.removeChild(script);
      };

      const timeout = setTimeout(() => {
        if (!done) { cleanup(); reject(new Error('timeout')); }
      }, 15000);

      window[cbName] = (data) => {
        clearTimeout(timeout);
        cleanup();
        resolve(data);
      };

      script.src = url + '&callback=' + cbName + '&_t=' + Date.now();
      script.onerror = () => {
        clearTimeout(timeout);
        cleanup();
        reject(new Error('載入失敗'));
      };
      document.head.appendChild(script);
    });
  }

  async function init() {
    setStatus('loading', '連線中...');

    // 1. 先用快取立刻顯示
    const now = todayTW().split('-');
    const thisMonth = now[0] + '/' + parseInt(now[1]);
    const cachedMonths = loadMonthsCache();
    const cachedRecords = loadCache(thisMonth);

    if (cachedMonths) {
      availableMonths = cachedMonths;
      if (!availableMonths.includes(thisMonth)) availableMonths.unshift(thisMonth);
      currentMonth = thisMonth;
      renderMonthTabs();
    }
    if (cachedRecords) {
      records = cachedRecords;
      renderRecords();
      renderStats();
      setStatus('loading', '同步中...');
    }

    // 2. 背景從 Sheets 更新
    try {
      const data = await fetchData(`${SCRIPT_URL}?action=init&year=${now[0]}&month=${parseInt(now[1])}`);
      availableMonths = data.months || [];
      if (!availableMonths.includes(thisMonth)) availableMonths.unshift(thisMonth);
      currentMonth = thisMonth;
      records = data.records || [];
      saveMonthsCache(availableMonths);
      saveCache(thisMonth, records);
      renderMonthTabs();
      renderRecords();
      renderStats();
      setStatus('ok', '已連接試算表');
    } catch (e) {
      if (cachedRecords) {
        setStatus('err', '離線（顯示快取）');
      } else {
        setStatus('err', '連線失敗');
        document.getElementById('recordsList').innerHTML = '<div class="empty-state">無法連接試算表</div>';
      }
    }
  }

  function renderMonthTabs() {
    document.getElementById('monthTabs').innerHTML = availableMonths.map(m =>
      `<button class="month-tab ${m === currentMonth ? 'active' : ''}" onclick="switchMonth('${m}')">${m}</button>`
    ).join('');
  }

  async function switchMonth(month) {
    currentMonth = month;
    renderMonthTabs();
    document.getElementById('statsTitle').textContent = month + ' 統計';

    // 先顯示快取
    const cached = loadCache(month);
    if (cached) {
      records = cached;
      renderRecords();
      renderStats();
      setStatus('loading', '同步中...');
    } else {
      document.getElementById('recordsList').innerHTML = '<div class="loading-state">載入中...</div>';
    }

    // 背景更新
    await loadRecords(false);
  }

  async function loadRecords(showSpinner = true) {
    const btn = document.getElementById('refreshBtn');
    if (showSpinner) {
      btn.classList.add('spinning');
      document.getElementById('recordsList').innerHTML = '<div class="loading-state">載入中...</div>';
    } else {
      btn.classList.add('spinning');
    }
    try {
      const [year, month] = currentMonth.split('/');
      const data = await fetchData(`${SCRIPT_URL}?action=read&year=${year}&month=${month}`);
      records = data.records || [];
      saveCache(currentMonth, records);
      renderRecords();
      renderStats();
      setStatus('ok', '已連接試算表');
    } catch (e) {
      setStatus('err', '同步失敗');
      if (showSpinner) {
        document.getElementById('recordsList').innerHTML = '<div class="empty-state">載入失敗，請點同步重試</div>';
      }
    } finally {
      btn.classList.remove('spinning');
    }
  }

  function setStatus(type, text) {
    document.getElementById('statusDot').className = 'status-dot ' + type;
    document.getElementById('statusText').textContent = text;
  }

  async function submitRecord() {
    const date = document.getElementById('inputDate').value;
    const amount = parseFloat(document.getElementById('inputAmount').value);
    const note = document.getElementById('inputNote').value.trim();
    if (!date || isNaN(amount) || amount <= 0) { showToast('請填寫日期和金額'); return; }

    const record = {
      date, type: typeSelected, amount, category: catSelected,
      who: whoSelected, note, id: Date.now().toString()
    };

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.querySelector('span').textContent = '送出中...';

    // 樂觀更新：立刻加進畫面
    const [y, m] = date.split('-');
    const newMonth = y + '/' + parseInt(m);
    if (!availableMonths.includes(newMonth)) {
      availableMonths.unshift(newMonth);
      saveMonthsCache(availableMonths);
    }
    currentMonth = newMonth;
    renderMonthTabs();
    records.unshift(record);
    saveCache(currentMonth, records);
    renderRecords();
    renderStats();
    document.getElementById('inputAmount').value = '';
    document.getElementById('inputNote').value = '';
    showToast('已新增 ✓');
    btn.disabled = false;
    btn.querySelector('span').textContent = '＋ 新增記錄';

    // 背景送到 Sheets，完成後靜默同步
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(record)
      });
      setTimeout(() => loadRecords(false), 1200);
    } catch (e) {
      showToast('網路異常，資料可能未同步');
    }
  }

  function filterRecords(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderRecords();
  }

  function renderRecords() {
    const list = document.getElementById('recordsList');
    let filtered = records;
    if (currentFilter !== '全部') {
      filtered = records.filter(r =>
        r.type === currentFilter || r.who === currentFilter || r.category === currentFilter
      );
    }
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state">這個月還沒有記錄</div>'; return;
    }
    list.innerHTML = filtered.map((r) => `
      <div class="record-wrapper" data-id="${r.id}">
        <div class="record-row">
          <div class="record-date">${formatDate(r.date)}</div>
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            <span class="tag ${r.who === '老公' ? 'husband' : 'wife'}">${r.who}</span>
            <span class="tag ${r.type === '收入' ? 'income' : 'expense'}">${r.type}</span>
            <span class="tag">${r.category}</span>
            <span style="font-size:13px;color:var(--text);">${r.note || ''}</span>
          </div>
          <div class="record-amount ${r.type === '收入' ? 'income' : ''}">
            ${r.type === '收入' ? '+' : ''}$${Number(r.amount).toLocaleString()}
          </div>
          <div class="record-hover-actions">
            <button class="hover-btn edit" onclick="openEdit('${r.id}')">✎ 編輯</button>
            <button class="hover-btn del" onclick="confirmDelete('${r.id}')">✕ 刪除</button>
          </div>
        </div>
        <div class="record-actions">
          <button class="action-btn edit-btn" onclick="openEdit('${r.id}')">
            <span class="action-icon">✎</span>編輯
          </button>
          <button class="action-btn del-btn" onclick="confirmDelete('${r.id}')">
            <span class="action-icon">✕</span>刪除
          </button>
        </div>
      </div>
    `).join('');

    // 綁定左滑手勢
    bindSwipe();
  
  }

  function renderStats() {
    const expense = records.filter(r => r.type !== '收入');
    const income = records.filter(r => r.type === '收入');
    const totalExpense = expense.reduce((s, r) => s + Number(r.amount), 0);
    const totalIncome = income.reduce((s, r) => s + Number(r.amount), 0);
    const balance = totalIncome - totalExpense;
    const husband = expense.filter(r => r.who === '老公').reduce((s, r) => s + Number(r.amount), 0);
    const wife = expense.filter(r => r.who === '老婆').reduce((s, r) => s + Number(r.amount), 0);

    document.getElementById('statIncome').textContent = '$' + totalIncome.toLocaleString();
    document.getElementById('statExpense').textContent = '$' + totalExpense.toLocaleString();
    const balEl = document.getElementById('statBalance');
    balEl.textContent = (balance >= 0 ? '+$' : '-$') + Math.abs(balance).toLocaleString();
    balEl.className = 'stat-value ' + (balance >= 0 ? 'positive' : 'negative');
    document.getElementById('statCount').textContent = records.length + ' 筆';
    document.getElementById('statHusband').textContent = '$' + husband.toLocaleString();
    document.getElementById('statWife').textContent = '$' + wife.toLocaleString();

    const cats = ['奕安','晚餐','點心','買菜','購物','其他'];
    const breakdown = document.getElementById('catBreakdown');
    const rows = cats.map(cat => {
      const amt = expense.filter(r => r.category === cat).reduce((s, r) => s + Number(r.amount), 0);
      if (amt === 0) return '';
      const pct = totalExpense > 0 ? Math.round(amt / totalExpense * 100) : 0;
      return `<div class="cat-row">
        <div class="cat-bar-label">${cat}</div>
        <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%"></div></div>
        <div class="cat-bar-amt">$${amt.toLocaleString()}</div>
      </div>`;
    }).join('');
    breakdown.innerHTML = rows || '<div style="font-size:13px;color:var(--muted);">本月尚無支出</div>';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function formatDate(val) {
    if (!val) return '—';
    const s = String(val).trim().replace(/\//g, '-').slice(0, 10);
    const parts = s.split('-');
    if (parts.length !== 3) return s;
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const m = parseInt(parts[1], 10);
    const d = parseInt(parts[2], 10);
    if (isNaN(m) || isNaN(d) || m < 1 || m > 12) return s;
    return months[m - 1] + ' ' + d;
  }

  function confirmDelete(id) {
    const r = records.find(r => String(r.id) === String(id));
    if (!r) return;
    if (!confirm(`確定刪除？\n${r.date}　${r.type}　${r.category}　$${r.amount}${r.note ? '　' + r.note : ''}`)) return;
    deleteRecord(String(id));
  }

  async function deleteRecord(id) {
    const r = records.find(r => String(r.id) === String(id));
    if (!r) return;
    records = records.filter(r => String(r.id) !== String(id));
    renderRecords();
    renderStats();
    showToast('已刪除');
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'delete', id: String(r.id), date: r.date, amount: r.amount, category: r.category })
      });
    } catch(e) {}
    setTimeout(() => loadRecords(), 1500);
  }

  function bindSwipe() {
    let startX = 0, startY = 0, activeWrapper = null;

    document.querySelectorAll('.record-wrapper').forEach(wrapper => {
      wrapper.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
      }, { passive: true });

      wrapper.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - startX;
        const dy = e.changedTouches[0].clientY - startY;

        // 水平滑動才觸發，避免干擾捲動
        if (Math.abs(dx) < Math.abs(dy) || Math.abs(dx) < 40) return;

        if (dx < 0) {
          // 左滑：展開
          if (activeWrapper && activeWrapper !== wrapper) {
            activeWrapper.classList.remove('swiped');
          }
          wrapper.classList.add('swiped');
          activeWrapper = wrapper;
        } else {
          // 右滑：收回
          wrapper.classList.remove('swiped');
          if (activeWrapper === wrapper) activeWrapper = null;
        }
      }, { passive: true });
    });

    // 點其他地方收回
    document.addEventListener('touchstart', e => {
      if (activeWrapper && !activeWrapper.contains(e.target)) {
        activeWrapper.classList.remove('swiped');
        activeWrapper = null;
      }
    }, { passive: true });
  }

  function openEdit(id) {
    const r = records.find(r => String(r.id) === String(id));
    if (!r) return;
    editingId = id;
    document.getElementById('editDate').value = r.date;
    document.getElementById('editAmount').value = r.amount;
    document.getElementById('editCategory').value = r.category;
    document.getElementById('editNote').value = r.note || '';
    document.getElementById('editModal').classList.remove('hidden');
  }

  function closeEdit() {
    editingId = null;
    document.getElementById('editModal').classList.add('hidden');
  }

  async function saveEdit() {
    const r = records.find(r => String(r.id) === String(editingId));
    if (!r) return;

    const newDate = document.getElementById('editDate').value;
    const newAmount = parseFloat(document.getElementById('editAmount').value);
    const newCategory = document.getElementById('editCategory').value;
    const newNote = document.getElementById('editNote').value.trim();

    if (!newDate || isNaN(newAmount) || newAmount <= 0) {
      showToast('請填寫日期和金額'); return;
    }

    // 樂觀更新
    r.date = newDate;
    r.amount = newAmount;
    r.category = newCategory;
    r.note = newNote;
    saveCache(currentMonth, records);
    renderRecords();
    renderStats();
    closeEdit();
    showToast('已更新 ✓');

    // 送到 Apps Script（先刪再新增）
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'delete', id: r.id, date: newDate, amount: newAmount, category: newCategory })
      });
      await fetch(SCRIPT_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...r, date: newDate, amount: newAmount, category: newCategory, note: newNote })
      });
      setTimeout(() => loadRecords(false), 1500);
    } catch(e) {
      showToast('網路異常，請手動同步');
    }
  }

  // 點 modal 背景關閉
  document.getElementById('editModal').addEventListener('click', function(e) {
    if (e.target === this) closeEdit();
  });

  init();
</script>

<script>
  // 註冊 Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .catch(() => {});
    });
  }
</script>
